---
name: Crossplane CI

on:
  pull_request:
    paths:
      - 'apps/**'

permissions:
  contents: write       # annotate job pushes annotations back to PR branch
  pull-requests: write  # validate/render jobs post PR comments
  issues: write         # required by actions/github-script to post comments

jobs:
  crossplane-ci:
    uses: cdelgehier/homelab-ci-templates/.github/workflows/crossplane-validate.yml@main
    with:
      claims-path: apps
    secrets: inherit
